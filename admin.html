<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillHub Admin Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f1f5f9; color: #1e293b; }

        /* LOGIN SCREEN */
        #loginScreen {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1e3a8a, #2563eb);
        }
        .login-box {
            background: white;
            padding: 2.5rem;
            border-radius: 1rem;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        .login-box h1 { font-size: 1.75rem; margin-bottom: 0.5rem; color: #1e3a8a; }
        .login-box p { color: #64748b; margin-bottom: 2rem; font-size: 0.875rem; }
        .login-box input {
            width: 100%; padding: 0.875rem 1rem; border: 2px solid #e2e8f0;
            border-radius: 0.5rem; font-size: 1rem; margin-bottom: 1rem;
            transition: border-color 0.2s;
        }
        .login-box input:focus { outline: none; border-color: #2563eb; }
        .login-btn {
            width: 100%; padding: 0.875rem; background: #2563eb; color: white;
            border: none; border-radius: 0.5rem; font-size: 1rem; font-weight: 600;
            cursor: pointer; transition: background 0.2s;
        }
        .login-btn:hover { background: #1d4ed8; }
        #loginError { color: #ef4444; font-size: 0.875rem; margin-top: 0.5rem; display: none; }

        /* DASHBOARD */
        #dashboard { display: none; }
        .topbar {
            background: #1e3a8a; color: white; padding: 1rem 2rem;
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 100;
        }
        .topbar h1 { font-size: 1.25rem; }
        .topbar-right { display: flex; align-items: center; gap: 1rem; }
        .admin-name { font-size: 0.875rem; opacity: 0.8; }
        .logout-btn {
            background: rgba(255,255,255,0.2); color: white; border: none;
            padding: 0.5rem 1rem; border-radius: 0.5rem; cursor: pointer;
            font-size: 0.875rem; transition: background 0.2s;
        }
        .logout-btn:hover { background: rgba(255,255,255,0.3); }

        /* TABS */
        .tabs {
            background: white; border-bottom: 2px solid #e2e8f0;
            display: flex; overflow-x: auto; padding: 0 2rem;
        }
        .tab-btn {
            padding: 1rem 1.5rem; border: none; background: none; cursor: pointer;
            font-size: 0.875rem; font-weight: 600; color: #64748b;
            border-bottom: 3px solid transparent; margin-bottom: -2px;
            white-space: nowrap; transition: all 0.2s;
        }
        .tab-btn.active { color: #2563eb; border-bottom-color: #2563eb; }
        .tab-btn i { margin-right: 0.5rem; }

        /* CONTENT */
        .content { padding: 2rem; max-width: 1400px; margin: 0 auto; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* STATS CARDS */
        .stats-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem; margin-bottom: 2rem;
        }
        .stat-card {
            background: white; padding: 1.5rem; border-radius: 0.75rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06); border-left: 4px solid #2563eb;
        }
        .stat-card.yellow { border-left-color: #f59e0b; }
        .stat-card.green { border-left-color: #10b981; }
        .stat-card.purple { border-left-color: #8b5cf6; }
        .stat-card.red { border-left-color: #ef4444; }
        .stat-card h3 { font-size: 2rem; font-weight: 800; color: #1e293b; }
        .stat-card p { font-size: 0.875rem; color: #64748b; margin-top: 0.25rem; }
        .stat-card i { font-size: 1.5rem; color: #2563eb; margin-bottom: 0.5rem; }
        .stat-card.yellow i { color: #f59e0b; }
        .stat-card.green i { color: #10b981; }
        .stat-card.purple i { color: #8b5cf6; }
        .stat-card.red i { color: #ef4444; }

        /* TABLE */
        .table-card {
            background: white; border-radius: 0.75rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06); overflow: hidden;
        }
        .table-header {
            padding: 1.25rem 1.5rem; border-bottom: 1px solid #e2e8f0;
            display: flex; justify-content: space-between; align-items: center;
        }
        .table-header h2 { font-size: 1.1rem; font-weight: 700; }
        .search-input {
            padding: 0.5rem 1rem; border: 1px solid #e2e8f0; border-radius: 0.5rem;
            font-size: 0.875rem; width: 250px;
        }
        table { width: 100%; border-collapse: collapse; }
        th { background: #f8fafc; padding: 0.875rem 1rem; text-align: left; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.5px; color: #64748b; }
        td { padding: 0.875rem 1rem; border-top: 1px solid #f1f5f9; font-size: 0.875rem; }
        tr:hover td { background: #f8fafc; }

        /* BADGES */
        .badge {
            display: inline-block; padding: 0.25rem 0.75rem; border-radius: 50px;
            font-size: 0.75rem; font-weight: 600;
        }
        .badge-active { background: #d1fae5; color: #065f46; }
        .badge-pending { background: #fef3c7; color: #92400e; }
        .badge-suspended { background: #fee2e2; color: #991b1b; }
        .badge-user { background: #dbeafe; color: #1e40af; }
        .badge-instructor { background: #ede9fe; color: #5b21b6; }
        .badge-freelancer { background: #fce7f3; color: #9d174d; }
        .badge-admin { background: #1e3a8a; color: white; }

        /* ACTION BUTTONS */
        .action-btn {
            padding: 0.375rem 0.75rem; border: none; border-radius: 0.375rem;
            font-size: 0.75rem; font-weight: 600; cursor: pointer; margin-right: 0.25rem;
            transition: opacity 0.2s;
        }
        .action-btn:hover { opacity: 0.8; }
        .btn-approve { background: #d1fae5; color: #065f46; }
        .btn-reject { background: #fee2e2; color: #991b1b; }
        .btn-view { background: #dbeafe; color: #1e40af; }
        .btn-suspend { background: #fef3c7; color: #92400e; }

        /* LOADING */
        .loading { text-align: center; padding: 3rem; color: #64748b; }
        .loading i { font-size: 2rem; margin-bottom: 1rem; display: block; }

        /* REFRESH BTN */
        .refresh-btn {
            background: #2563eb; color: white; border: none; padding: 0.5rem 1rem;
            border-radius: 0.5rem; cursor: pointer; font-size: 0.875rem;
            display: flex; align-items: center; gap: 0.5rem;
        }
        .refresh-btn:hover { background: #1d4ed8; }

        /* MODAL */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center;
        }
        .modal-overlay.active { display: flex; }
        .modal-box {
            background: white; border-radius: 1rem; padding: 2rem; max-width: 500px;
            width: 90%; max-height: 80vh; overflow-y: auto;
        }
        .modal-box h3 { font-size: 1.25rem; margin-bottom: 1rem; }
        .modal-close { float: right; background: none; border: none; font-size: 1.5rem; cursor: pointer; }
        .detail-row { display: flex; gap: 1rem; margin-bottom: 0.75rem; font-size: 0.875rem; }
        .detail-label { font-weight: 600; min-width: 120px; color: #64748b; }

        @media (max-width: 768px) {
            .content { padding: 1rem; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .search-input { width: 150px; }
            table { font-size: 0.75rem; }
            td, th { padding: 0.5rem; }
        }
    </style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen">
    <div class="login-box">
        <h1><img src="logo.png" alt="SkillHub" style="width:36px;height:36px;object-fit:contain;vertical-align:middle;margin-right:0.5rem;"> SkillHub</h1>
        <p>Admin Dashboard — Restricted Access</p>
        <input type="email" id="adminEmail" placeholder="Admin Email" value="admin@skillhub.com">
        <input type="password" id="adminPassword" placeholder="Password" value="Admin123456">
        <button class="login-btn" onclick="adminLogin()">
            <i class="fas fa-sign-in-alt"></i> Login to Dashboard
        </button>
        <p id="loginError">Invalid credentials. Access denied.</p>
    </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
    <div class="topbar">
        <h1><img src="logo.png" alt="SkillHub" style="width:28px;height:28px;object-fit:contain;filter:brightness(0) invert(1);vertical-align:middle;margin-right:0.5rem;"> SkillHub Admin</h1>
        <div class="topbar-right">
            <span class="admin-name" id="adminNameDisplay">Admin</span>
            <button class="logout-btn" onclick="adminLogout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
        </div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="showTab('overview', event)"><i class="fas fa-chart-bar"></i> Overview</button>
        <button class="tab-btn" onclick="showTab('pending', event)"><i class="fas fa-clock"></i> Pending <span id="pendingCount" style="background:#ef4444;color:white;border-radius:50px;padding:0.1rem 0.4rem;font-size:0.7rem;margin-left:0.25rem;"></span></button>
        <button class="tab-btn" onclick="showTab('users', event)"><i class="fas fa-users"></i> Users</button>
        <button class="tab-btn" onclick="showTab('freelancers', event)"><i class="fas fa-laptop-code"></i> Freelancers</button>
        <button class="tab-btn" onclick="showTab('courses', event)"><i class="fas fa-book"></i> Courses</button>
        <button class="tab-btn" onclick="showTab('transactions', event)"><i class="fas fa-money-bill"></i> Transactions</button>
        <button class="tab-btn" onclick="showTab('messages', event)"><i class="fas fa-envelope"></i> Messages</button>
    </div>

    <div class="content">
        <!-- OVERVIEW TAB -->
        <div id="tab-overview" class="tab-content active">
            <div class="stats-grid" id="statsGrid">
                <div class="loading"><i class="fas fa-spinner fa-spin"></i> Loading stats...</div>
            </div>
        </div>

        <!-- PENDING APPROVALS TAB -->
        <div id="tab-pending" class="tab-content">
            <div class="table-card">
                <div class="table-header">
                    <h2>Pending Approvals</h2>
                    <button class="refresh-btn" onclick="loadPending()"><i class="fas fa-sync"></i> Refresh</button>
                </div>
                <div id="pendingTable"><div class="loading"><i class="fas fa-spinner fa-spin"></i> Loading...</div></div>
            </div>
        </div>

        <!-- USERS TAB -->
        <div id="tab-users" class="tab-content">
            <div class="table-card">
                <div class="table-header">
                    <h2>All Users</h2>
                    <div style="display:flex;gap:0.5rem;">
                        <input type="text" class="search-input" placeholder="Search users..." oninput="filterTable('usersTable', this.value)">
                        <button class="refresh-btn" onclick="loadUsers()"><i class="fas fa-sync"></i> Refresh</button>
                    </div>
                </div>
                <div id="usersTable"><div class="loading"><i class="fas fa-spinner fa-spin"></i> Loading...</div></div>
            </div>
        </div>

        <!-- FREELANCERS TAB -->
        <div id="tab-freelancers" class="tab-content">
            <div class="table-card">
                <div class="table-header">
                    <h2>Freelancers</h2>
                    <div style="display:flex;gap:0.5rem;">
                        <input type="text" class="search-input" placeholder="Search freelancers..." oninput="filterTable('freelancersTable', this.value)">
                        <button class="refresh-btn" onclick="loadFreelancers()"><i class="fas fa-sync"></i> Refresh</button>
                    </div>
                </div>
                <div id="freelancersTable"><div class="loading"><i class="fas fa-spinner fa-spin"></i> Loading...</div></div>
            </div>
        </div>

        <!-- COURSES TAB -->
        <div id="tab-courses" class="tab-content">
            <div class="table-card">
                <div class="table-header">
                    <h2>Courses</h2>
                    <div style="display:flex;gap:0.5rem;">
                        <input type="text" class="search-input" placeholder="Search courses..." oninput="filterTable('coursesTable', this.value)">
                        <button class="refresh-btn" onclick="loadCourses()"><i class="fas fa-sync"></i> Refresh</button>
                    </div>
                </div>
                <div id="coursesTable"><div class="loading"><i class="fas fa-spinner fa-spin"></i> Loading...</div></div>
            </div>
        </div>

        <!-- TRANSACTIONS TAB -->
        <div id="tab-transactions" class="tab-content">
            <div class="table-card">
                <div class="table-header">
                    <h2>Transactions</h2>
                    <button class="refresh-btn" onclick="loadTransactions()"><i class="fas fa-sync"></i> Refresh</button>
                </div>
                <div id="transactionsTable"><div class="loading"><i class="fas fa-spinner fa-spin"></i> Loading...</div></div>
            </div>
        </div>

        <!-- MESSAGES TAB -->
        <div id="tab-messages" class="tab-content">
            <div class="table-card">
                <div class="table-header">
                    <h2>Contact Messages</h2>
                    <button class="refresh-btn" onclick="loadMessages()"><i class="fas fa-sync"></i> Refresh</button>
                </div>
                <div id="messagesTable"><div class="loading"><i class="fas fa-spinner fa-spin"></i> Loading...</div></div>
            </div>
        </div>
    </div>
</div>

<!-- DETAIL MODAL -->
<div class="modal-overlay" id="detailModal">
    <div class="modal-box">
        <button class="modal-close" onclick="closeModal()">&times;</button>
        <div id="modalContent"></div>
    </div>
</div>

<script src="admin.js"></script>
</body>
</html>
