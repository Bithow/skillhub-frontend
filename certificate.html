<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Certificate of Completion - SkillHub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f1f5f9; }

        .topbar {
            background: #1e3a8a; color: white; padding: 1rem 2rem;
            display: flex; justify-content: space-between; align-items: center;
        }
        .topbar a { color: white; text-decoration: none; font-size: 1.1rem; font-weight: 700; }
        .actions {
            display: flex; gap: 1rem; padding: 1.5rem 2rem;
            justify-content: center; background: #f1f5f9;
        }
        .btn {
            padding: 0.75rem 1.5rem; border: none; border-radius: 0.5rem;
            font-size: 0.875rem; font-weight: 600; cursor: pointer;
            display: flex; align-items: center; gap: 0.5rem;
        }
        .btn-print { background: #2563eb; color: white; }
        .btn-print:hover { background: #1d4ed8; }
        .btn-back { background: white; color: #374151; border: 2px solid #e2e8f0; }
        .btn-back:hover { background: #f8fafc; }

        /* CERTIFICATE */
        .cert-wrapper {
            display: flex; justify-content: center; padding: 2rem;
        }
        .certificate {
            width: 900px; min-height: 640px;
            background: white;
            border: 12px solid #1e3a8a;
            border-radius: 8px;
            padding: 3rem;
            position: relative;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
        }
        .cert-corner {
            position: absolute; width: 80px; height: 80px;
            border-color: #fbbf24; border-style: solid;
        }
        .cert-corner.tl { top: 12px; left: 12px; border-width: 4px 0 0 4px; }
        .cert-corner.tr { top: 12px; right: 12px; border-width: 4px 4px 0 0; }
        .cert-corner.bl { bottom: 12px; left: 12px; border-width: 0 0 4px 4px; }
        .cert-corner.br { bottom: 12px; right: 12px; border-width: 0 4px 4px 0; }

        .cert-header { text-align: center; margin-bottom: 2rem; }
        .cert-logo { font-size: 2.5rem; color: #1e3a8a; margin-bottom: 0.5rem; }
        .cert-brand { font-size: 1.5rem; font-weight: 800; color: #1e3a8a; letter-spacing: 2px; }
        .cert-brand span { color: #fbbf24; }
        .cert-divider {
            width: 100%; height: 2px;
            background: linear-gradient(90deg, transparent, #1e3a8a, #fbbf24, #1e3a8a, transparent);
            margin: 1.5rem 0;
        }
        .cert-title {
            text-align: center; font-size: 2.5rem; font-weight: 800;
            color: #1e3a8a; letter-spacing: 3px; text-transform: uppercase;
            margin-bottom: 0.5rem;
        }
        .cert-subtitle {
            text-align: center; font-size: 1rem; color: #64748b;
            letter-spacing: 2px; text-transform: uppercase; margin-bottom: 2rem;
        }
        .cert-presented {
            text-align: center; font-size: 1rem; color: #64748b; margin-bottom: 0.5rem;
        }
        .cert-name {
            text-align: center; font-size: 3rem; font-weight: 700;
            color: #1e293b; font-style: italic; margin-bottom: 1.5rem;
            border-bottom: 2px solid #fbbf24; padding-bottom: 0.5rem;
            display: inline-block; min-width: 400px;
        }
        .cert-name-wrapper { text-align: center; }
        .cert-completed {
            text-align: center; font-size: 1rem; color: #64748b; margin-bottom: 0.5rem;
        }
        .cert-course {
            text-align: center; font-size: 1.75rem; font-weight: 700;
            color: #1e3a8a; margin-bottom: 2rem;
        }
        .cert-footer {
            display: flex; justify-content: space-between; align-items: flex-end;
            margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid #e2e8f0;
        }
        .cert-sig { text-align: center; }
        .cert-sig-line {
            width: 180px; height: 2px; background: #1e293b; margin-bottom: 0.5rem;
        }
        .cert-sig-name { font-size: 0.875rem; font-weight: 700; color: #1e293b; }
        .cert-sig-title { font-size: 0.75rem; color: #64748b; }
        .cert-seal {
            width: 100px; height: 100px; border-radius: 50%;
            background: linear-gradient(135deg, #1e3a8a, #2563eb);
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; color: white; text-align: center;
        }
        .cert-seal i { font-size: 1.5rem; margin-bottom: 0.25rem; }
        .cert-seal span { font-size: 0.6rem; font-weight: 700; letter-spacing: 1px; }
        .cert-date { font-size: 0.875rem; color: #64748b; }
        .cert-id { font-size: 0.7rem; color: #94a3b8; margin-top: 0.25rem; }

        /* PRINT STYLES */
        @media print {
            .topbar, .actions { display: none !important; }
            body { background: white; }
            .cert-wrapper { padding: 0; }
            .certificate { box-shadow: none; width: 100%; }
        }

        @media (max-width: 960px) {
            .certificate { width: 100%; padding: 2rem 1.5rem; }
            .cert-title { font-size: 1.75rem; }
            .cert-name { font-size: 2rem; min-width: 280px; }
            .cert-course { font-size: 1.25rem; }
        }
    </style>
</head>
<body>

<div class="topbar">
    <a href="index.html"><img src="logo.png" alt="SkillHub" style="width:28px;height:28px;object-fit:contain;filter:brightness(0) invert(1);vertical-align:middle;margin-right:0.5rem;"> SkillHub</a>
    <span style="font-size:0.875rem;opacity:0.8;">Certificate of Completion</span>
</div>

<div class="actions">
    <button class="btn btn-back" onclick="window.history.back()"><i class="fas fa-arrow-left"></i> Back</button>
    <button class="btn btn-print" onclick="window.print()"><i class="fas fa-download"></i> Download / Print Certificate</button>
</div>

<div class="cert-wrapper">
    <div class="certificate">
        <div class="cert-corner tl"></div>
        <div class="cert-corner tr"></div>
        <div class="cert-corner bl"></div>
        <div class="cert-corner br"></div>

        <div class="cert-header">
            <div class="cert-logo"><img src="logo.png" alt="SkillHub" style="width:60px;height:60px;object-fit:contain;"></div>
            <div class="cert-brand">Skill<span>Hub</span></div>
        </div>

        <div class="cert-divider"></div>

        <div class="cert-title">Certificate</div>
        <div class="cert-subtitle">of Completion</div>

        <div class="cert-presented">This is to certify that</div>
        <div class="cert-name-wrapper">
            <div class="cert-name" id="certName">Student Name</div>
        </div>

        <div class="cert-completed" style="margin-top:1.5rem;">has successfully completed the course</div>
        <div class="cert-course" id="certCourse">Course Title</div>

        <div class="cert-footer">
            <div class="cert-sig">
                <div class="cert-sig-line"></div>
                <div class="cert-sig-name">SkillHub Admin</div>
                <div class="cert-sig-title">Platform Director, SkillHub</div>
            </div>
            <div class="cert-seal">
                <i class="fas fa-award"></i>
                <span>SKILLHUB<br>CERTIFIED</span>
            </div>
            <div style="text-align:right;">
                <div class="cert-date" id="certDate">Date</div>
                <div class="cert-id" id="certId">Certificate ID</div>
            </div>
        </div>
    </div>
</div>

<script>
var params = new URLSearchParams(window.location.search);
var name = params.get("name") || "Student";
var course = params.get("course") || "Course";
var date = params.get("date") || new Date().toLocaleDateString("en-US", { year: "numeric", month: "long", day: "numeric" });
var certId = params.get("id") || ("SKH-" + Date.now().toString(36).toUpperCase());

document.getElementById("certName").textContent = decodeURIComponent(name);
document.getElementById("certCourse").textContent = decodeURIComponent(course);
document.getElementById("certDate").textContent = "Issued: " + decodeURIComponent(date);
document.getElementById("certId").textContent = "Certificate ID: " + certId;
document.title = "Certificate - " + decodeURIComponent(name) + " - SkillHub";
</script>
</body>
</html>
